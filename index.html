<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日任务</title>
<style>
:root {
  --bg: #0f0f1a;
  --card: #1a1a2e;
  --accent: #7c5cfc;
  --accent-hover: #9678ff;
  --text: #e8e8f0;
  --text-muted: #8888a0;
  --done: #4ade80;
  --delete: #f87171;
  --border: #2a2a40;
  --input-bg: #12121f;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}
.app { width: 100%; max-width: 520px; }
.header { text-align: center; margin-bottom: 36px; }
.header h1 {
  font-size: 2rem; font-weight: 700;
  background: linear-gradient(135deg, #7c5cfc, #c084fc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p { color: var(--text-muted); margin-top: 6px; font-size: 0.9rem; }
.stats { display: flex; gap: 12px; margin-bottom: 24px; }
.stat {
  flex: 1; background: var(--card); border-radius: 12px;
  padding: 14px 16px; text-align: center; border: 1px solid var(--border);
}
.stat-value { font-size: 1.6rem; font-weight: 700; }
.stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
.input-row { display: flex; gap: 10px; margin-bottom: 24px; }
.input-row input {
  flex: 1; padding: 14px 18px; border-radius: 12px;
  border: 1px solid var(--border); background: var(--input-bg);
  color: var(--text); font-size: 1rem; outline: none;
  transition: border-color 0.2s;
}
.input-row input:focus { border-color: var(--accent); }
.input-row button {
  padding: 14px 24px; border-radius: 12px; border: none;
  background: var(--accent); color: #fff; font-size: 1rem;
  font-weight: 600; cursor: pointer; transition: background 0.2s;
}
.input-row button:hover { background: var(--accent-hover); }
.task-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.task-item {
  background: var(--card); border-radius: 12px; padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  border: 1px solid var(--border); transition: border-color 0.2s, transform 0.15s;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.task-item:hover { border-color: var(--accent); }
.task-check {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.task-check:hover { border-color: var(--done); }
.task-item.done .task-check { background: var(--done); border-color: var(--done); }
.task-check::after {
  content: "✓"; color: #000; font-size: 0.7rem;
  font-weight: 700; opacity: 0; transition: opacity 0.2s;
}
.task-item.done .task-check::after { opacity: 1; }
.task-text { flex: 1; font-size: 0.95rem; word-break: break-word; }
.task-item.done .task-text { text-decoration: line-through; color: var(--text-muted); }
.task-delete {
  background: none; border: none; color: var(--text-muted);
  font-size: 1.1rem; cursor: pointer; padding: 4px 8px;
  border-radius: 8px; transition: all 0.2s;
}
.task-delete:hover { color: var(--delete); background: rgba(248,113,113,0.1); }
.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-icon { font-size: 3rem; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📋 每日任务</h1>
    <p>一条一条来，做完就打勾</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-value" id="totalCount">0</div><div class="stat-label">全部</div></div>
    <div class="stat"><div class="stat-value" id="doneCount">0</div><div class="stat-label">已完成</div></div>
    <div class="stat"><div class="stat-value" id="pendingCount">0</div><div class="stat-label">待完成</div></div>
  </div>
  <div class="input-row">
    <input type="text" id="taskInput" placeholder="添加一个新任务..." autofocus>
    <button id="addBtn">添加</button>
  </div>
  <ul class="task-list" id="taskList"></ul>
  <div class="empty" id="emptyState"><div class="empty-icon">🎯</div><p>还没有任务，来添加一个吧！</p></div>
</div>
<script>
const STORAGE_KEY = "daily-tasks";
var tasks = [];

function loadTasks() {
  try { var saved = localStorage.getItem(STORAGE_KEY); tasks = saved ? JSON.parse(saved) : []; }
  catch(ex) { tasks = []; }
}
function saveTasks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); }

function escapeHtml(text) {
  var d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}

function updateStats() {
  var total = tasks.length;
  var done = tasks.filter(function(t){ return t.done; }).length;
  document.getElementById("totalCount").textContent = total;
  document.getElementById("doneCount").textContent = done;
  document.getElementById("pendingCount").textContent = total - done;
}

function render() {
  var list = document.getElementById("taskList");
  var empty = document.getElementById("emptyState");
  list.innerHTML = "";
  if (tasks.length === 0) {
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    tasks.forEach(function(task, i) {
      var li = document.createElement("li");
      li.className = "task-item" + (task.done ? " done" : "");
      li.innerHTML =
        "<div class=\"task-check\" data-index=\"" + i + "\"></div>" +
        "<span class=\"task-text\">" + escapeHtml(task.text) + "</span>" +
        "<button class=\"task-delete\" data-index=\"" + i + "\">✕</button>";
      list.appendChild(li);
    });
  }
  updateStats();
}

function addTask() {
  var input = document.getElementById("taskInput");
  var text = input.value.trim();
  if (!text) return;
  tasks.push({ text: text, done: false });
  input.value = "";
  saveTasks();
  render();
  input.focus();
}

function toggleTask(index) {
  tasks[index].done = !tasks[index].done;
  saveTasks();
  render();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  saveTasks();
  render();
}

document.getElementById("addBtn").addEventListener("click", addTask);
document.getElementById("taskInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") addTask();
});
document.getElementById("taskList").addEventListener("click", function(e) {
  var idx = e.target.dataset.index;
  if (idx === undefined) return;
  if (e.target.classList.contains("task-check")) toggleTask(parseInt(idx));
  else if (e.target.classList.contains("task-delete")) deleteTask(parseInt(idx));
});

loadTasks();
render();
</script>
</body>
</html>
